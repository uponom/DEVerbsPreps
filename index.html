<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.ico">
  <title>Deutsch Verben mit Präpositionen</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #555555;
      --muted-2: #777777;
      --button-bg: #f2f2f2;
      --button-text: #111111;
      --button-border: #cccccc;
      --card-bg: #ffffff;
      --progress-bg: #b22222;
      --progress-fill: #1a8f3b;
      --overlay: rgba(0, 0, 0, 0.6);
      --case-akk-bg: #fde7ef;
      --case-dat-bg: #e6f2ff;
    }

    body.theme-dark {
      --bg: #0f1115;
      --text: #e6e6e6;
      --muted: #b6b6b6;
      --muted-2: #999999;
      --button-bg: #1e232b;
      --button-text: #e6e6e6;
      --button-border: #3a3f48;
      --card-bg: #151a21;
      --progress-bg: #5b1a1a;
      --progress-fill: #2aa44f;
      --overlay: rgba(0, 0, 0, 0.7);
      --case-akk-bg: #3a1f2a;
      --case-dat-bg: #233a5c;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 700px;
      margin: auto;
      background-color: var(--bg);
      color: var(--text);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 18px;
    }

    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-bottom: 0;
      flex-wrap: nowrap;
    }

    .verb-list-button {
      width: 36px;
      height: 32px;
      padding: 0;
      margin: 0;
      font-size: 18px;
      line-height: 1;
      border-radius: 10px;
    }

    .lang-switcher button {
      width: 32px;
      height: 26px;
      padding: 0;
      margin-left: 0;
      font-size: 9px;
      line-height: 1;
      cursor: pointer;
      border-radius: 8px;
    }

    .lang-switcher button.active {
      background-color: var(--bg);
      border: 2px solid #7a0000;
    }

    .level-filters,
    .tag-filters {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-left: 4px;
      flex-wrap: wrap;
    }

    .level-filters button {
      width: 32px;
      height: 26px;
      font-size: 9px;
    }

    .level-filters button.active,
    .tag-filters button.active {
      background-color: var(--bg);
      border: 2px solid #7a0000;
    }

    .tag-filters button {
      min-height: 26px;
      padding: 0 8px;
      font-size: 10px;
      white-space: nowrap;
    }

    .tag-filters-label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 2px;
    }

    .progress-container + .tag-filters {
      margin-left: 0;
      margin-top: 8px;
    }


    .translation {
      color: var(--muted);
      font-style: italic;
      font-size: 20px;
      margin-bottom: 5px;
    }

    .translation.blurred {
      filter: blur(6px);
      user-select: none;
      cursor: pointer;
    }

    .verb-display {
      font-size: 24px;
      margin: 10px 0 15px;
      font-weight: bold;
    }

    .case-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      font-size: 16px;
      font-weight: normal;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      vertical-align: middle;
    }

    .case-badge.case-akk {
      background-color: var(--case-akk-bg);
    }

    .case-badge.case-dat {
      background-color: var(--case-dat-bg);
    }

    .speak-button {
      margin-left: 6px;
      padding: 4px 8px;
      font-size: 18px;
      line-height: 1;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      cursor: pointer;
      vertical-align: middle;
    }

    .verb-display .sich {
      color: var(--muted-2);
    }

    button {
      margin: 5px;
      padding: 10px 16px;
      font-size: 24px;
      cursor: pointer;
      border-radius: 10px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
    }

    button.prep-akk {
      background-color: var(--case-akk-bg);
    }

    button.prep-dat {
      background-color: var(--case-dat-bg);
    }

    #options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    .correct-answer {
      font-size: 24px;
    }

    #nextButton {
      display: none;
      margin-top: 10px;
    }

    .progress-header {
      margin-top: 30px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .progress-container {
      margin-top: 0;
    }

    .progress-text {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .progress-bar-button {
      display: block;
      width: 100%;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background-color: var(--progress-bg);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
    }

    .progress-bar-button:focus-visible .progress-bar {
      outline: 2px solid #7a0000;
      outline-offset: 3px;
    }

    .progress-segment {
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-fill-green {
      background-color: var(--progress-fill);
    }

    .progress-fill-yellow {
      background-color: #f4c542;
    }

    .progress-fill-orange {
      background-color: #f28c28;
    }

    .example-text {
      font-style: italic;
      color: var(--muted);
      font-size: 24px;
      margin-bottom: 8px;
    }

    .example-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .example-divider {
      border: none;
      border-top: 1px solid var(--button-border);
      margin: 18px 0 10px;
    }

    .example-speak-button {
      padding: 4px 8px;
      font-size: 18px;
      line-height: 1;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      cursor: pointer;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--overlay);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #ffffff;
      color: #111111;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 90%;
    }

    .modal-list-content {
      max-width: 640px;
      width: 90%;
      max-height: 80vh;
      overflow: hidden;
      text-align: left;
      background: var(--card-bg);
      color: var(--text);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-close {
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      cursor: pointer;
    }

    .verb-list {
      margin: 16px 0 0;
      padding-left: 22px;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 18px;
      line-height: 1.45;
    }

    .verb-list .sich-muted {
      color: var(--muted-2);
    }

    .verb-list .prep-strong {
      font-weight: bold;
    }

    .verb-card-content {
      max-width: 520px;
      width: 90%;
      text-align: left;
      background: var(--card-bg);
      color: var(--text);
    }

    .verb-card-title {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .verb-card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
    }

    .verb-card-speak {
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 8px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      cursor: pointer;
      line-height: 1;
    }

    .verb-card-translation {
      font-size: 18px;
      margin: 4px 0;
      color: var(--text);
    }

    .verb-card-translation .label {
      font-weight: 600;
      margin-right: 6px;
      color: var(--muted);
    }

    .verb-card-example {
      margin-top: 14px;
      font-size: 18px;
      font-style: italic;
      color: var(--muted);
    }

    .restart-button {
      margin-top: 20px;
      font-size: 20px;
      padding: 10px 20px;
      border-radius: 8px;
    }

    .example-speak-button.is-hidden {
      display: none;
    }

    .stats-modal-content {
      max-width: 560px;
      width: 90%;
      text-align: left;
      background: var(--card-bg);
      color: var(--text);
    }

    .stats-title {
      margin: 0;
      font-size: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .stats-card {
      border: 1px solid var(--button-border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.04);
    }

    .stats-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stats-value {
      display: block;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stats-note {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .share-button {
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 6px;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: 1px solid var(--button-border);
      cursor: pointer;
    }

    .share-title {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .share-qr {
      width: 200px;
      height: 200px;
      display: inline-block;
    }

    .share-qr canvas,
    .share-qr img {
      width: 200px;
      height: 200px;
      display: block;
    }

    .share-origin {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .translation {
        font-size: 28px;
      }
      .verb-display {
        font-size: 32px;
      }
      button {
        font-size: 32px;
        padding: 8px 10px;
      }
      .lang-switcher button {
        width: 34px;
        height: 28px;
        font-size: 12px;
      }
      .level-filters button {
        width: 34px;
        height: 28px;
        font-size: 12px;
      }
      .tag-filters {
        margin-left: 0;
        margin-top: 6px;
      }
      .tag-filters button {
        min-height: 28px;
        font-size: 12px;
      }
      .verb-list-button {
        width: 34px;
        height: 28px;
        font-size: 16px;
      }
      #result {
        font-size: 26px;
      }
      .correct-answer {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

    <div id="congratsModal" class="modal-overlay">
    <div class="modal-content">
        <h2>🎉 Glückwunsch! Du hast den Test abgeschlossen!</h2>
        <button class="restart-button" onclick="restartTest()">🔁 Test erneut starten</button>
    </div>
    </div>

  <div class="top-bar">
    <button id="verbListButton" class="verb-list-button" type="button" aria-label="Verb list">📚</button>
    <div class="lang-switcher">
      <button onclick="setLanguage('en')">EN</button>
      <button onclick="setLanguage('ua')">UA</button>
      <button onclick="setLanguage('ru')">RU</button>
      <button id="speechToggle" type="button" onclick="toggleSpeech()"></button>
      <button id="themeToggle" class="theme-toggle" type="button" onclick="toggleTheme()"></button>
      <div id="levelFilters" class="level-filters" aria-label="Level filters"></div>
    </div>
  </div>
  <div class="translation" id="translation"></div>
  <div class="verb-display" id="verb"></div>
  <div id="options"></div>
  <p id="result"></p>
  <button id="nextButton" onclick="newQuestion()">➡️</button>

  <hr class="example-divider" />
  <div class="example-row">
    <div id="example" class="example-text"></div>
    <button id="exampleSpeakButton" class="example-speak-button is-hidden" type="button" aria-label="Speak example">🔊</button>
  </div>

  <div class="progress-header">
    <div class="progress-text" id="progressText"></div>
    <button id="shareButton" class="share-button" type="button"></button>
  </div>
  <div class="progress-container">
    <button id="progressBarButton" class="progress-bar-button" type="button" aria-label="Open training statistics">
      <div class="progress-bar">
        <div class="progress-segment progress-fill-green" id="progressFillGreen"></div>
        <div class="progress-segment progress-fill-yellow" id="progressFillYellow"></div>
        <div class="progress-segment progress-fill-orange" id="progressFillOrange"></div>
      </div>
    </button>
  </div>
  <div id="tagFilters" class="tag-filters" aria-label="Tag filters"></div>

  <div id="shareModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content">
      <div id="shareTitle" class="share-title"></div>
      <div id="shareQr" class="share-qr" aria-label="QR code"></div>
      <div id="shareOrigin" class="share-origin"></div>
    </div>
  </div>

  <div id="verbListModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content modal-list-content" role="dialog" aria-modal="true" aria-labelledby="verbListTitle">
      <div class="modal-header">
        <h2 id="verbListTitle"></h2>
        <button id="verbListClose" class="modal-close" type="button" aria-label="Close">✖</button>
      </div>
      <ul id="verbList" class="verb-list"></ul>
    </div>
  </div>

  <div id="verbCardModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content verb-card-content" role="dialog" aria-modal="true" aria-labelledby="verbCardTitle">
      <div class="modal-header">
        <div class="verb-card-title-row">
          <h2 id="verbCardTitle" class="verb-card-title"></h2>
          <button id="verbCardSpeak" class="verb-card-speak" type="button" aria-label="Speak card">🔊</button>
        </div>
        <button id="verbCardClose" class="modal-close" type="button" aria-label="Close">✖</button>
      </div>
      <div id="verbCardBody"></div>
    </div>
  </div>

  <div id="statsModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content stats-modal-content" role="dialog" aria-modal="true" aria-labelledby="statsModalTitle">
      <div class="modal-header">
        <h2 id="statsModalTitle" class="stats-title">Training stats</h2>
        <button id="statsModalClose" class="modal-close" type="button" aria-label="Close">✖</button>
      </div>
      <div id="statsModalBody"></div>
    </div>
  </div>

  <script src="service-worker.js"></script>
  <script src="qrcode.min.js"></script>
  <script>
    // Verb + preposition dataset with weighted repetition.
    const data = [
  {verb:  "achten", correct:  "auf", case:  "Akkusativ", probability:  7, translations:  {ru:  "обращать внимание на", en:  "to pay attention", ua:  "звертати увагу на"}, example:  "Achte auf die rote Ampel!", Tags:  ["FB"], level:  "B1"},
  {verb:  "antworten", correct:  "auf", case:  "Akkusativ", probability:  7, translations:  {ru:  "отвечать на", en:  "to answer to", ua:  "відповідати на"}, example:  "Ich antworte auf deine Frage.", Tags:  ["FB"], level:  "B1"},
  {verb:  "sich ärgern", correct:  "über", case:  "Akkusativ", probability:  7, translations:  {ru:  "злиться на", en:  "to be annoyed about", ua:  "злитися на"}, example:  "Ich ärgere mich über das schlechte Wetter.", Tags:  ["FB"], level:  "B1"},
  {verb:  "sich aufregen", correct:  "über", case:  "Akkusativ", probability:  7, translations:  {ru:  "волноваться из-за", en:  "to get upset about", ua:  "хвилюватися через"}, example:  "Sie regt sich immer über den Lärm auf.", Tags:  [], level:  "B1"},
  {verb:  "sich bedanken", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "благодарить за", en:  "to thank for", ua:  "дякувати за"}, example:  "Paul bedankt sich bei Lisa für die Hilfe.", Tags:  [], level:  "B1"},
  {verb:  "beschränken", correct:  "auf", case:  "Akkusativ", probability:  7, translations:  {ru:  "ограничивать чем-то", en:  "to limit to", ua:  "обмежувати чимось"}, example:  "Wir beschränken uns auf das Wichtigste.", Tags:  [], level:  "B1"},
  {verb:  "sich beschweren", correct:  "über", case:  "Akkusativ", probability:  7, translations:  {ru:  "жаловаться на", en:  "to complain about", ua:  "скаржитися на"}, example:  "Der Vater beschwert sich über die Kinder.", Tags:  ["FB"], level:  "B1"},
  {verb:  "bitten", correct:  "um", case:  "Akkusativ", probability:  7, translations:  {ru:  "просить о", en:  "to ask for", ua:  "просити про"}, example:  "Ich bitte dich um Entschuldigung.", Tags:  ["FB"], level:  "B1"},
  {verb:  "denken", correct:  "an", case:  "Akkusativ", probability:  7, translations:  {ru:  "думать о", en:  "to think about", ua:  "думати про"}, example:  "Denkst du an den Termin heute Abend?", Tags:  ["FB"], level:  "B1"},
  {verb:  "durchsetzen", correct:  "gegen", case:  "Akkusativ", probability:  7, translations:  {ru:  "пробиваться через", en:  "to push through against", ua:  "пробиватися через"}, example:  "Er setzt sich gegen die Konkurrenz durch.", Tags:  ["FB"], level:  "B1"},
  {verb:  "sich eignen", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "подходить для", en:  "to be suitable for", ua:  "підходити для"}, example:  "Anna eignet sich sehr gut für den Job.", Tags:  [], level:  "B1"},
  {verb:  "einbringen", correct:  "in", case:  "Akkusativ", probability:  7, translations:  {ru:  "вносить в", en:  "to bring into", ua:  "вносити в"}, example:  "Er bringt neue Ideen in das Projekt ein.", Tags:  [], level:  "B1"},
  {verb:  "eingehen", correct:  "auf", case:  "Akkusativ", probability:  7, translations:  {ru:  "вникать в", en:  "to go into", ua:  "заглиблюватися в"}, example:  "Sie geht auf die Frage ein.", Tags:  [], level:  "B1"},
  {verb:  "einsetzen", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "использовать для", en:  "to use for", ua:  "використовувати для"}, example:  "Wir setzen die Mittel für das Projekt ein.", Tags:  [], level:  "B1"},
  {verb:  "sich einsetzen", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "заступаться за", en:  "to stand up for", ua:  "заступатися за"}, example:  "Die Schüler setzten sich für Tiere ein.", Tags:  ["FB"], level:  "B1"},
  {verb:  "einziehen", correct:  "in", case:  "Akkusativ", probability:  7, translations:  {ru:  "въезжать в", en:  "to move into", ua:  "в’їжджати в"}, example:  "Wir ziehen in eine neue Wohnung ein.", Tags:  [], level:  "B1"},
  {verb:  "sich engagieren", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "активно участвовать в", en:  "to get involved in", ua:  "активно брати участь у"}, example:  "Er engagiert sich für soziale Projekte.", Tags:  ["FB"], level:  "B1"},
  {verb:  "sich entscheiden", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "решиться на", en:  "to decide on", ua:  "вирішити щодо"}, example:  "Ich entscheide mich für ein rotes Kleid.", Tags:  ["FB"], level:  "B1"},
  {verb:  "sich entschuldigen", correct:  "für", case:  "Akkusativ", probability:  7, translations:  {ru:  "извиняться за", en:  "to apologize for", ua:  "вибачатися за"}, example:  "Bernd entschuldigt sich für die Verspätung.", Tags:  ["FB"], level:  "B1"},

      if (statsModal && statsModal.style.display === "flex") {
        renderStatsModal();
      }
    }

    // Update active language button styling.
    function updateLanguageButtons() {
      document.querySelectorAll(".lang-switcher button").forEach((btn) => {
        const lang = btn.getAttribute("onclick");
        const isLangButton = lang && lang.includes("setLanguage(");
        if (!isLangButton) return;
        const match = lang.match(/setLanguage\('([a-z]+)'\)/);
        const isActive = match && match[1] === currentLang;
        btn.classList.toggle("active", Boolean(isActive));
      });
    }

    function updateShareLabels() {
      const button = document.getElementById("shareButton");
      const title = document.getElementById("shareTitle");
      if (button) button.textContent = shareButtonText[currentLang] || shareButtonText.en;
      if (title) title.textContent = shareTitleText;
    }

    function updateVerbListLabels() {
      const button = document.getElementById("verbListButton");
      const title = document.getElementById("verbListTitle");
      const closeButton = document.getElementById("verbListClose");
      if (button) button.setAttribute("aria-label", verbListButtonLabel[currentLang] || verbListButtonLabel.en);
      if (title) title.textContent = verbListTitleText[currentLang] || verbListTitleText.en;
      if (closeButton) closeButton.setAttribute("aria-label", verbListCloseLabel[currentLang] || verbListCloseLabel.en);
    }

    function updateVerbCardLabels() {
      const closeButton = document.getElementById("verbCardClose");
      const speakButton = document.getElementById("verbCardSpeak");
      if (closeButton) closeButton.setAttribute("aria-label", verbCardCloseLabel[currentLang] || verbCardCloseLabel.en);
      if (speakButton) speakButton.setAttribute("aria-label", verbCardSpeakLabel[currentLang] || verbCardSpeakLabel.en);
    }

    // Map grammatical case to badge class.
    function getCaseClass(grammarCase) {
      if (grammarCase === "Akkusativ") return "case-akk";
      if (grammarCase === "Dativ") return "case-dat";
      return "";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function getItemKey(item) {
      return `${item.verb}__${item.correct}__${item.case}`;
    }

    function getAvailableTags() {
      return [...new Set(data.flatMap((item) => item.Tags))]
        .sort((a, b) => a.localeCompare(b, "de", { sensitivity: "base" }));
    }

    function getProgressStats() {
      const activeData = getActiveData();
      const total = activeData.length;
      const mastered = activeData.filter((item) => item.probability === 1).length;
      const greenCount = activeData.filter((item) => item.probability < 2).length;
      const yellowCount = activeData.filter((item) => item.probability >= 2 && item.probability < 4).length;
      const orangeCount = activeData.filter((item) => item.probability >= 4 && item.probability < 6).length;
      const redCount = Math.max(0, total - greenCount - yellowCount - orangeCount);
      const percent = Math.round(total ? (mastered / total) * 100 : 0);
      const totalPenaltyRaw = activeData.reduce((sum, item) => sum + item.probability, 0);
      const currentPenaltyRaw = currentItem ? currentItem.probability : 0;
      const answeredInActive = activeData.filter((item) => answeredItemKeys.has(getItemKey(item))).length;
      const correctInActive = activeData.filter((item) => correctlyAnsweredItemKeys.has(getItemKey(item))).length;
      const accuracy = totalAnswers ? Math.round((correctAnswers / totalAnswers) * 100) : 0;

      return {
        total,
        mastered,
        greenCount,
        yellowCount,
        orangeCount,
        redCount,
        percent,
        totalPenalty: Math.floor(totalPenaltyRaw / 2),
        currentPenalty: Math.floor(currentPenaltyRaw / 2),
        currentVerb: currentItem ? `${currentItem.verb} ${currentItem.correct}` : (total ? "No active question" : "No matching verbs"),
        answeredInActive,
        correctInActive,
        accuracy
      };
    }

    // Refresh the speech toggle icon.
    function updateSpeechButton() {
      const button = document.getElementById("speechToggle");
      if (!button) return;
      button.textContent = speechEnabled ? speechToggleIcons.on : speechToggleIcons.off;
    }

    // Enable or disable speech synthesis.
    function toggleSpeech() {
      speechEnabled = !speechEnabled;
      updateSpeechButton();
      saveSettings();
    }

    // Pick a German TTS voice if available.
    function pickGermanVoice() {
      if (!('speechSynthesis' in window)) return;
      const voices = window.speechSynthesis.getVoices();
      germanVoice = voices.find((v) => (v.lang || "").toLowerCase().startsWith("de")) || null;
    }

    // Speak text only if speech is enabled.
    function speakGerman(text) {
      try {
        if (!('speechSynthesis' in window)) return;
        if (!text || !speechEnabled) return;
        if (!germanVoice) pickGermanVoice();
        const utterance = new SpeechSynthesisUtterance(text);
        if (germanVoice) utterance.voice = germanVoice;
        utterance.lang = (germanVoice && germanVoice.lang) ? germanVoice.lang : "de-DE";
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        console.warn("Speech synthesis unavailable:", error);
      }
    }

    // Speak text regardless of the toggle.
    function speakGermanForce(text) {
      try {
        if (!('speechSynthesis' in window)) return;
        if (!text) return;
        if (!germanVoice) pickGermanVoice();
        const utterance = new SpeechSynthesisUtterance(text);
        if (germanVoice) utterance.voice = germanVoice;
        utterance.lang = (germanVoice && germanVoice.lang) ? germanVoice.lang : "de-DE";
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch (error) {
        console.warn("Speech synthesis unavailable:", error);
      }
    }

    function pickVoiceForLang(langCode) {
      if (!('speechSynthesis' in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const code = (langCode || "").toLowerCase();
      return voices.find((v) => (v.lang || "").toLowerCase().startsWith(code)) || null;
    }

    function speakSequence(segments) {
      if (!('speechSynthesis' in window)) return;
      const queue = (segments || []).filter((seg) => seg && seg.text);
      if (!queue.length) return;
      window.speechSynthesis.cancel();
      const speakNext = (index) => {
        if (index >= queue.length) return;
        const seg = queue[index];
        const utterance = new SpeechSynthesisUtterance(seg.text);
        if (seg.voice) utterance.voice = seg.voice;
        if (seg.lang) utterance.lang = seg.lang;
        utterance.onend = () => speakNext(index + 1);
        window.speechSynthesis.speak(utterance);
      };
      speakNext(0);
    }

    // Format reflexive verbs for display.
    function formatVerb(verb) {
      if (verb.startsWith("sich ")) {
        const parts = verb.split(" ");
        return `<span class="sich">${parts[0]}</span> ${parts.slice(1).join(" ")}`;
      }
      return verb;
    }

    function replacePrepositionInExample(example, correct) {
      if (!example || !correct) return example;
      const contractions = {
        an: ["am", "ans"],
        in: ["im", "ins"],
        zu: ["zum", "zur"],
        bei: ["beim"],
        von: ["vom"],
        durch: ["durchs"],
        "für": ["fürs"],
        um: ["ums"],
        auf: ["aufs"],
        "über": ["überm", "übers"],
        unter: ["unterm", "unters"],
        vor: ["vorm", "vors"],
        hinter: ["hinterm"]
      };
      const variants = [correct, ...(contractions[correct] || [])];
      const escaped = variants.map((value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
      const pattern = `(^|\\s)(${escaped.join("|")})(?=\\b)`;
      return example.replace(new RegExp(pattern, "giu"), "$1...");
    }

    // Active dataset filtered by level and tag.
    function getActiveData() {
      return data.filter((item) => {
        const levelMatch = !activeLevels.size || activeLevels.has(item.level);
        const tagMatch = !activeTag || item.Tags.includes(activeTag);
        return levelMatch && tagMatch;
      });
    }

    // Weighted random selection based on probability.
    function getWeightedRandomIndex(items) {
      const pool = [];
      items.forEach((item, index) => {
        for (let i = 0; i < item.probability; i++) {
          pool.push(index);
        }
      });
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // Render a new quiz question.
    function newQuestion() {
      const activeData = getActiveData();
      if (!activeData.length) {
        currentItem = null;
        currentCorrect = "";
        document.getElementById("translation").textContent = "";
        document.getElementById("translation").classList.remove("blurred");
        document.getElementById("translation").onclick = null;
        document.getElementById("verb").textContent = "No verbs for the selected filters.";
        document.getElementById("result").textContent = "";
        document.getElementById("example").textContent = "";
        document.getElementById("exampleSpeakButton").classList.add("is-hidden");
        document.getElementById("options").innerHTML = "";
        document.getElementById("nextButton").style.display = "none";
        updateProgress();
        return;
      }
      const selectedIndex = getWeightedRandomIndex(activeData);
      const item = activeData[selectedIndex];
      const { verb, correct, translations, case: grammarCase, example } = item;

      currentItem = item;
      currentCorrect = correct;
      const translationEl = document.getElementById("translation");
      translationEl.textContent = item.probability < 4 ? "" : translations[currentLang];
      translationEl.classList.toggle("blurred", item.probability >= 4 && item.probability < 6);
      translationEl.onclick = () => {
        if (translationEl.classList.contains("blurred")) {
          translationEl.classList.remove("blurred");
        }
      };
      const caseClass = getCaseClass(grammarCase);
      document.getElementById("verb").innerHTML = `${formatVerb(verb)} <span class="case-badge ${caseClass}">${grammarCase}</span>`;
      document.getElementById("result").textContent = "";
      document.getElementById("nextButton").style.display = "none";
      document.getElementById("nextButton").textContent = nextButtonText[currentLang];

      // Replace the current preposition with ellipses, including special chars (ä, ü, ö, ß).
      if (example && correct) {
        const replaced = replacePrepositionInExample(example, correct);
        document.getElementById("example").textContent = replaced;
        document.getElementById("exampleSpeakButton").classList.add("is-hidden");
      } else {
        document.getElementById("example").textContent = "";
        document.getElementById("exampleSpeakButton").classList.add("is-hidden");
      }

      const container = document.getElementById("options");
      container.innerHTML = "";

      prepositions.forEach((prep) => {
        const btn = document.createElement("button");
        btn.textContent = prep;
        if (akkPrepositions.has(prep)) {
          btn.classList.add("prep-akk");
        } else if (datPrepositions.has(prep)) {
          btn.classList.add("prep-dat");
        }
        btn.onclick = () => handleAnswer(prep);
        container.appendChild(btn);
      });

      updateProgress()
    }

    // Handle the user's answer selection.
    function handleAnswer(selected) {
      const container = document.getElementById("options");
      container.innerHTML = "";
      const result = document.getElementById("result");
      const correct = currentCorrect;
      const item = currentItem;
      if (!item) return;
      const itemKey = getItemKey(item);
      totalAnswers += 1;
      answeredItemKeys.add(itemKey);
      const translationEl = document.getElementById("translation");
      translationEl.textContent = item.translations[currentLang];
      translationEl.classList.remove("blurred");

      if (selected === correct) {
        correctAnswers += 1;
        correctlyAnsweredItemKeys.add(itemKey);
        result.textContent = resultText[currentLang].correct;
        if (item.probability > 2) item.probability -= 2;
      } else {
        wrongAnswers += 1;
        result.innerHTML = `${resultText[currentLang].wrong} <span class="correct-answer">${correct}</span>`;
        if (item.probability < 39) item.probability += 2;
      }

      const answerCaseClass = getCaseClass(item.case);
      document.getElementById("verb").innerHTML =
        `${formatVerb(item.verb)} ${item.correct}` +
        ` <span class="case-badge ${answerCaseClass}">${item.case}</span>` +
        ` <button id="speakAnswerButton" class="speak-button" type="button" aria-label="Speak answer">🔊</button>`;
      const speakButton = document.getElementById("speakAnswerButton");
      if (speakButton) {
        speakButton.onclick = () => speakGermanForce(`${item.verb} ${item.correct}`);
      }
      document.getElementById("nextButton").style.display = "inline-block";
      // Show the example after answering.
      document.getElementById("example").textContent = item.example ? item.example : "";
      const exampleButton = document.getElementById("exampleSpeakButton");
      if (item.example) {
        exampleButton.classList.remove("is-hidden");
        exampleButton.onclick = () => speakGermanForce(item.example);
      } else {
        exampleButton.classList.add("is-hidden");
      }
      speakGerman(`${item.verb} ${item.correct}`);
      updateProgress();
    }

    // Update progress and penalty stats.
    function updateProgress() {
        const stats = getProgressStats();
        const { total, greenCount, yellowCount, orangeCount, percent } = stats;
        const progressLabel = progressLabelText[currentLang] || progressLabelText.en;
        document.getElementById("progressText").textContent = `${progressLabel}: ${percent}%`;
        const segmentTotal = total || 1;
        const greenRatio = greenCount / segmentTotal;
        const yellowRatio = yellowCount / segmentTotal;
        const orangeRatio = orangeCount / segmentTotal;
        document.getElementById("progressFillGreen").style.width = `${(greenRatio * 100).toFixed(2)}%`;
        document.getElementById("progressFillYellow").style.width = `${(yellowRatio * 100).toFixed(2)}%`;
        document.getElementById("progressFillOrange").style.width = `${(orangeRatio * 100).toFixed(2)}%`;

        if (percent === 100 && total > 0) {
            document.getElementById("congratsModal").style.display = "flex";
        }
    }

    function renderStatsModal() {
      const body = document.getElementById("statsModalBody");
      if (!body) return;
      const stats = getProgressStats();
      const levelsLabel = Array.from(activeLevels).join(", ") || "All";
      const tagLabel = activeTag || (noTagFiltersText[currentLang] || noTagFiltersText.en);
      const cards = [
        ["App version", window.DEVERBS_CACHE_VERSION || ""],
        ["Current word", stats.currentVerb],
        ["Current penalty", `${stats.currentPenalty}`],
        ["Total penalty", `${stats.totalPenalty}`],
        ["Words in current filter", `${stats.total}`],
        ["Mastered words", `${stats.mastered}`],
        ["Correct answers", `${correctAnswers}`],
        ["Wrong answers", `${wrongAnswers}`],
        ["Accuracy", `${stats.accuracy}%`],
        ["Answered words in filter", `${stats.answeredInActive}`],
        ["Correctly answered words in filter", `${stats.correctInActive}`],
        ["Active levels", levelsLabel],
        ["Active tag", tagLabel],
        ["Green / yellow / orange / red", `${stats.greenCount} / ${stats.yellowCount} / ${stats.orangeCount} / ${stats.redCount}`]
      ];

      body.innerHTML = `
        <div class="stats-grid">
          ${cards.map(([label, value]) => `
            <div class="stats-card">
              <span class="stats-label">${escapeHtml(label)}</span>
              <span class="stats-value">${escapeHtml(value)}</span>
            </div>
          `).join("")}
        </div>
        <div class="stats-note">
          Progress uses the currently active level and tag filters. Green, yellow and orange segments reflect the filtered subset only; the dark red background is the remaining words that still need more correct answers.
        </div>
      `;
    }

    function openStatsModal() {
      renderStatsModal();
      const modal = document.getElementById("statsModal");
      if (!modal) return;
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
    }

    function closeStatsModal() {
      const modal = document.getElementById("statsModal");
      if (!modal) return;
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }

    // Reset probabilities and restart the test.
    function restartTest() {
        data.forEach((item) => {
          item.probability = item.initialProbability;
        });
        totalAnswers = 0;
        correctAnswers = 0;
        wrongAnswers = 0;
        answeredItemKeys.clear();
        correctlyAnsweredItemKeys.clear();
        currentItem = null;
        currentCorrect = "";
        document.getElementById("congratsModal").style.display = "none";
        newQuestion();
        updateProgress();
    }

    // Render level filter buttons.
    function renderLevelFilters() {
      const container = document.getElementById("levelFilters");
      if (!container) return;
      container.innerHTML = "";
      availableLevels.forEach((level) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = level;
        btn.classList.toggle("active", activeLevels.has(level));
        btn.onclick = () => {
          const isActive = activeLevels.has(level);
          if (isActive && activeLevels.size === 1) return;
          if (isActive) {
            activeLevels.delete(level);
          } else {
            activeLevels.add(level);
          }
          renderLevelFilters();
          renderTagFilters();
          newQuestion();
          updateProgress();
          saveSettings();
        };
        container.appendChild(btn);
      });
    }

    function renderTagFilters() {
      const container = document.getElementById("tagFilters");
      if (!container) return;
      const availableTags = getAvailableTags();
      container.innerHTML = "";
      if (activeTag && !availableTags.includes(activeTag)) {
        activeTag = "";
      }
      if (!availableTags.length) {
        container.style.display = "none";
        return;
      }
      container.style.display = "flex";

      const label = document.createElement("span");
      label.className = "tag-filters-label";
      label.textContent = tagsLabelText[currentLang] || tagsLabelText.en;
      container.appendChild(label);

      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.textContent = noTagFiltersText[currentLang] || noTagFiltersText.en;
      allButton.classList.toggle("active", !activeTag);
      allButton.onclick = () => {
        activeTag = "";
        renderTagFilters();
        newQuestion();
        updateProgress();
        saveSettings();
      };
      container.appendChild(allButton);

      availableTags.forEach((tag) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = tag;
        btn.classList.toggle("active", activeTag === tag);
        btn.onclick = () => {
          activeTag = activeTag === tag ? "" : tag;
          renderTagFilters();
          newQuestion();
          updateProgress();
          saveSettings();
        };
        container.appendChild(btn);
      });
    }

    function getShareOrigin() {
      const origin = window.location.origin;
      if (!origin || origin === "null") return window.location.href;
      const baseUrl = new URL(".", window.location.href).href;
      return baseUrl;
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed.lang === "string") {
          currentLang = parsed.lang;
        }
        if (parsed && typeof parsed.speechEnabled === "boolean") {
          speechEnabled = parsed.speechEnabled;
        }
        if (parsed && Array.isArray(parsed.activeLevels)) {
          const filtered = parsed.activeLevels.filter((level) => availableLevels.includes(level));
          if (filtered.length) {
            activeLevels = new Set(filtered);
          }
        }
        if (parsed && typeof parsed.activeTag === "string" && getAvailableTags().includes(parsed.activeTag)) {
          activeTag = parsed.activeTag;
        }
        if (parsed && (parsed.theme === "dark" || parsed.theme === "light")) {
          localStorage.setItem("theme", parsed.theme);
        }
      } catch (error) {
        console.warn("Failed to load settings:", error);
      }
    }

    function saveSettings() {
      try {
        const payload = {
          lang: currentLang,
          speechEnabled,
          activeLevels: Array.from(activeLevels),
          activeTag,
          theme: currentTheme
        };
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn("Failed to save settings:", error);
      }
    }

    function openShareModal() {
      const modal = document.getElementById("shareModal");
      const qr = document.getElementById("shareQr");
      const originEl = document.getElementById("shareOrigin");
      const origin = getShareOrigin();
      if (qr) {
        qr.innerHTML = "";
        if (typeof QRCode === "function") {
          try {
            new QRCode(qr, {
              text: origin,
              width: 200,
              height: 200,
              colorDark: "#111111",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.M
            });
          } catch (error) {
            qr.textContent = "QR unavailable";
          }
        } else {
          qr.textContent = "QR unavailable";
        }
      }
      if (originEl) originEl.textContent = origin;
      if (modal) modal.style.display = "flex";
    }

    function closeShareModal() {
      const modal = document.getElementById("shareModal");
      if (modal) modal.style.display = "none";
    }

    function renderVerbList() {
      const list = document.getElementById("verbList");
      if (!list) return;
      list.innerHTML = "";
      const formatVerbForList = (verb) => {
        if (verb.startsWith("sich ")) {
          const rest = verb.slice(5);
          return `<span class="sich-muted">sich</span> ${rest}`;
        }
        return verb;
      };
      const formatVerbForCard = (verb) => {
        if (verb.startsWith("sich ")) {
          const rest = verb.slice(5);
          return `<span class="sich-muted">sich</span> ${rest}`;
        }
        return verb;
      };
      const items = [...getActiveData()].sort((a, b) => {
        const normalizeVerb = (verb) => verb.trim().replace(/^sich\s+/i, "");
        const aVerb = normalizeVerb(a.verb);
        const bVerb = normalizeVerb(b.verb);
        const verbCompare = aVerb.localeCompare(bVerb, "de", { sensitivity: "base" });
        if (verbCompare !== 0) return verbCompare;
        return a.correct.localeCompare(b.correct, "de", { sensitivity: "base" });
      });
      items.forEach((item) => {
        const li = document.createElement("li");
        const translation = item.translations[currentLang] || "";
        li.innerHTML = `${formatVerbForList(item.verb)} <span class="prep-strong">${item.correct}</span> — ${translation}`;
        li.onclick = () => openVerbCardModal(item, formatVerbForCard);
        list.appendChild(li);
      });
    }

    function openVerbListModal() {
      const modal = document.getElementById("verbListModal");
      if (!modal) return;
      renderVerbList();
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
    }

    function closeVerbListModal() {
      const modal = document.getElementById("verbListModal");
      if (!modal) return;
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }

    function speakVerbCard(item) {
      const translation = item.translations[currentLang] || "";
      const example = item.example || "";
      const verbText = `${item.verb} ${item.correct}`;
      const langMap = { en: "en", ua: "uk", ru: "ru" };
      const translationLang = langMap[currentLang] || "en";
      if (!germanVoice) pickGermanVoice();
      const translationVoice = pickVoiceForLang(translationLang);
      const segments = [
        { text: verbText, lang: germanVoice ? germanVoice.lang : "de-DE", voice: germanVoice },
        { text: translation, lang: translationLang, voice: translationVoice },
        { text: example, lang: germanVoice ? germanVoice.lang : "de-DE", voice: germanVoice }
      ];
      speakSequence(segments);
    }

    function openVerbCardModal(item, formatVerbForCard) {
      const modal = document.getElementById("verbCardModal");
      const title = document.getElementById("verbCardTitle");
      const body = document.getElementById("verbCardBody");
      const speakButton = document.getElementById("verbCardSpeak");
      if (!modal || !title || !body) return;
      title.innerHTML = `${formatVerbForCard(item.verb)} <span class="prep-strong">${item.correct}</span>`;
      const en = item.translations.en || "";
      const ua = item.translations.ua || "";
      const ru = item.translations.ru || "";
      const example = item.example || "";
      body.innerHTML = `
        <div class="verb-card-translation"><span class="label">EN:</span>${en}</div>
        <div class="verb-card-translation"><span class="label">UA:</span>${ua}</div>
        <div class="verb-card-translation"><span class="label">RU:</span>${ru}</div>
        <div class="verb-card-example">${example}</div>
      `;
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
      if (speakButton) speakButton.onclick = () => speakVerbCard(item);
      if (speechEnabled) {
        speakVerbCard(item);
      }
    }

    function closeVerbCardModal() {
      const modal = document.getElementById("verbCardModal");
      if (!modal) return;
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }


    // Refresh theme toggle icon.
    function updateThemeButton() {
      const button = document.getElementById("themeToggle");
      if (!button) return;
      const key = currentTheme === "dark" ? "dark" : "light";
      button.textContent = themeToggleIcons[key];
    }

    // Apply the given theme and persist it.
    function setTheme(theme) {
      currentTheme = theme;
      document.body.classList.toggle("theme-dark", theme === "dark");
      localStorage.setItem("theme", theme);
      updateThemeButton();
      saveSettings();
    }

    // Toggle between light and dark themes.
    function toggleTheme() {
      setTheme(currentTheme === "dark" ? "light" : "dark");
    }

    // Initialize theme based on stored preference or system settings.
    function initTheme() {
      const stored = localStorage.getItem("theme");
      if (stored === "dark" || stored === "light") {
        setTheme(stored);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      setTheme(prefersDark ? "dark" : "light");
    }

    // === Main part ===

    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }

    loadSettings();
    initTheme();
    updateSpeechButton();
    updateLanguageButtons();
    updateShareLabels();
    updateVerbListLabels();
    updateVerbCardLabels();
    renderLevelFilters();
    renderTagFilters();
    if ('speechSynthesis' in window) {
      pickGermanVoice();
      window.speechSynthesis.addEventListener('voiceschanged', pickGermanVoice);
    }
    document.getElementById("shareButton").onclick = openShareModal;
    document.getElementById("shareModal").onclick = closeShareModal;
    document.getElementById("progressBarButton").onclick = openStatsModal;
    document.getElementById("verbListButton").onclick = openVerbListModal;
    document.getElementById("verbListClose").onclick = closeVerbListModal;
    document.getElementById("verbListModal").onclick = closeVerbListModal;
    const verbListContent = document.querySelector("#verbListModal .modal-list-content");
    if (verbListContent) {
      verbListContent.onclick = (event) => event.stopPropagation();
    }
    document.getElementById("verbCardClose").onclick = closeVerbCardModal;
    document.getElementById("verbCardModal").onclick = closeVerbCardModal;
    const verbCardContent = document.querySelector("#verbCardModal .verb-card-content");
    if (verbCardContent) {
      verbCardContent.onclick = (event) => event.stopPropagation();
    }
    document.getElementById("statsModalClose").onclick = closeStatsModal;
    document.getElementById("statsModal").onclick = closeStatsModal;
    const statsModalContent = document.querySelector("#statsModal .stats-modal-content");
    if (statsModalContent) {
      statsModalContent.onclick = (event) => event.stopPropagation();
    }
    newQuestion();
    updateProgress();

  </script>
